name: Close answered issues

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  close-answered:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const OWNER_LOGIN = context.repo.owner;
            const DAYS = 30;
            const cutoff = new Date(Date.now() - DAYS * 24 * 60 * 60 * 1000);

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100,
            });

            for (const issue of issues) {
              if (issue.pull_request) continue;

              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                per_page: 100,
              });

              if (comments.length === 0) continue;

              const last = comments[comments.length - 1];
              if (last.user.login !== OWNER_LOGIN) continue;
              if (new Date(last.created_at) > cutoff) continue;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: "Closing this issue as there has been no follow-up in 30 days. Feel free to reopen if you have more questions.",
              });

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: "closed",
                state_reason: "not_planned",
              });

              core.info(`Closed issue #${issue.number}: ${issue.title}`);
            }
